name: flash_card_app
description: A cross-platform flash card app with handwriting recognition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # Firebase
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.5
  firebase_auth: ^5.4.1

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.6.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
